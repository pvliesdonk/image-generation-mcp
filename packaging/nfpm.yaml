# yaml-language-server: $schema=https://nfpm.goreleaser.com/schema.json
#
# nfpm configuration for image-generation-mcp .deb and .rpm packages.
# Build: VERSION=1.1.0 nfpm package --packager deb --target dist/
#        VERSION=1.1.0 nfpm package --packager rpm --target dist/

name: image-generation-mcp
arch: "${ARCH:-amd64}"
platform: linux
# VERSION env var is required (e.g. VERSION=1.1.0 nfpm package ...)
# Note: nfpm does not support bash :? guards — use simple ${VAR} only.
version: "${VERSION}"
version_schema: semver
section: utils
priority: optional
maintainer: "pvliesdonk <pvliesdonk@users.noreply.github.com>"
description: |
  Multi-provider image generation MCP server supporting OpenAI
  (gpt-image-1, dall-e-3), Stable Diffusion (A1111 WebUI), and a
  zero-cost placeholder provider. Requires uv — see postinstall instructions.
homepage: "https://pvliesdonk.github.io/image-generation-mcp/"
license: "MIT"

# --- Package contents ---

contents:
  # systemd unit file
  - src: packaging/image-generation-mcp.service
    dst: /usr/lib/systemd/system/image-generation-mcp.service

  # Example environment file (preserved on upgrade, never overwritten)
  - src: packaging/env.example
    dst: /etc/image-generation-mcp/env.example
    type: config|noreplace

  # State directory (auto-created with correct ownership)
  - dst: /var/lib/image-generation-mcp
    type: dir
    file_info:
      mode: 0750
      owner: image-generation-mcp
      group: image-generation-mcp

# --- Lifecycle scripts ---

scripts:
  preinstall: packaging/scripts/preinstall.sh
  postinstall: packaging/scripts/postinstall.sh
  preremove: packaging/scripts/preremove.sh
  postremove: packaging/scripts/postremove.sh

# --- Packager-specific overrides ---
# Dependencies are defined per-packager (nfpm overrides replace, not extend).

overrides:
  deb:
    depends:
      - python3 (>= 3.11)
    recommends:
      - curl
  rpm:
    depends:
      - python3 >= 3.11
