site_name: Image Generation MCP Server
site_url: https://pvliesdonk.github.io/image-generation-mcp/
site_description: Multi-provider image generation MCP server built on FastMCP
repo_url: https://github.com/pvliesdonk/image-generation-mcp
repo_name: pvliesdonk/image-generation-mcp
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

exclude_docs: |
  design/**
  decisions/**

plugins:
  - search
  - llmstxt:
      full_output: llms-full.txt
      markdown_description: >
        image-generation-mcp is a multi-provider image generation MCP server
        supporting OpenAI (gpt-image-1, dall-e-3), A1111 (Stable Diffusion WebUI),
        and a zero-cost placeholder provider. Features keyword-based auto-selection,
        background tasks with progress reporting, and resource-based image transforms.
      sections:
        Getting Started:
          - index.md: Overview -- features, providers, quick start
          - getting-started/installation.md: Installation from PyPI, uv, source, or Docker
          - getting-started/claude-desktop.md: Claude Desktop MCP configuration
          - getting-started/claude-code.md: Claude Code MCP configuration
        Providers:
          - providers/index.md: Provider comparison and selection guide
          - providers/openai.md: OpenAI provider setup and capabilities
          - providers/a1111.md: A1111 Stable Diffusion WebUI setup
          - providers/placeholder.md: Zero-cost placeholder for testing
        Configuration:
          - configuration.md: All environment variables with types and defaults
        MCP Interface:
          - tools.md: MCP tools with parameters and examples
          - resources.md: MCP resources with URI patterns
          - prompts.md: MCP prompts with workflow descriptions
        Guides:
          - guides/authentication.md: Authentication modes -- bearer, OIDC, multi-auth
          - guides/prompt-writing.md: Provider-specific prompt writing tips
        Deployment:
          - deployment/docker.md: Docker Compose, Traefik, volumes
          - deployment/systemd.md: Systemd service, .deb/.rpm packages, security hardening
          - deployment/oidc.md: OIDC authentication setup
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_bases: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2
            members_order: source
            docstring_style: google
            merge_init_into_class: true
            show_if_no_docstring: false

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/installation.md
      - Claude Desktop: getting-started/claude-desktop.md
      - Claude Code: getting-started/claude-code.md
  - Providers:
      - Overview: providers/index.md
      - OpenAI: providers/openai.md
      - A1111 (Stable Diffusion): providers/a1111.md
      - Placeholder: providers/placeholder.md
  - Configuration: configuration.md
  - MCP Interface:
      - Tools: tools.md
      - Resources: resources.md
      - Prompts: prompts.md
  - Guides:
      - Authentication: guides/authentication.md
      - Prompt Writing: guides/prompt-writing.md
      - Image Assets: guides/image-assets.md
  - Deployment:
      - Docker: deployment/docker.md
      - Systemd: deployment/systemd.md
      - OIDC Authentication: deployment/oidc.md
