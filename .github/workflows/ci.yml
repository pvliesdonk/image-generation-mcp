name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run ruff check
        run: uv run ruff check src/ tests/

      - name: Run ruff format check
        run: uv run ruff format --check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run mypy
        run: uv run mypy src/

  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: ${{ matrix.experimental || false }}
    permissions:
      contents: read
      pull-requests: read
      statuses: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.11"
            experimental: false
          - python-version: "3.12"
            experimental: false
          - python-version: "3.13"
            experimental: false
          - python-version: "3.14"
            experimental: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.13'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          override_pr: ${{ github.event.pull_request.number }}
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Fetch base branch for diff-cover
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request'
        run: git fetch origin ${{ github.base_ref }} --depth=50

      - name: Check patch coverage
        id: patch-coverage
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          # Check if PR has Python source changes
          PY_COUNT=$(gh pr view "$PR_NUMBER" --json files --jq '[.files[].path | select(endswith(".py"))] | length')

          if [ "$PY_COUNT" = "0" ]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=Coverage not affected" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Run diff-cover against base branch
          uv run diff-cover coverage.xml \
            --compare-branch="origin/${BASE_REF}" \
            --fail-under=80 > /tmp/diff-cover.txt 2>&1 && RC=0 || RC=$?

          cat /tmp/diff-cover.txt

          # Extract percentage from "Total:   XX.X%" line
          PCT=$(grep -oP 'Total:\s+\K[0-9.]+' /tmp/diff-cover.txt || echo "")

          if [ -z "$PCT" ] && [ "$RC" != "0" ]; then
            # diff-cover failed and we couldn't parse output
            echo "state=error" >> "$GITHUB_OUTPUT"
            echo "description=diff-cover failed to compute patch coverage" >> "$GITHUB_OUTPUT"
          elif [ -z "$PCT" ]; then
            # No coverable lines in diff (comments, docstrings, type stubs)
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=No coverable lines in diff" >> "$GITHUB_OUTPUT"
          elif [ "$RC" = "0" ]; then
            echo "state=success" >> "$GITHUB_OUTPUT"
            echo "description=${PCT}% patch coverage (threshold: 80%)" >> "$GITHUB_OUTPUT"
          else
            echo "state=failure" >> "$GITHUB_OUTPUT"
            echo "description=${PCT}% patch coverage — below 80% threshold" >> "$GITHUB_OUTPUT"
          fi

      - name: Post codecov/patch status
        if: matrix.python-version == '3.13' && github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        env:
          PATCH_STATE: ${{ steps.patch-coverage.outputs.state }}
          PATCH_DESC: ${{ steps.patch-coverage.outputs.description }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = process.env.PATCH_STATE || 'error';
            const description = process.env.PATCH_DESC || 'Patch coverage check failed';
            const headSha = context.payload.pull_request.head.sha;
            core.info(`Posting codecov/patch: ${state} — ${description} to ${headSha}`);
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: headSha,
              state,
              context: 'codecov/patch',
              description,
              target_url: `https://app.codecov.io/gh/${context.repo.owner}/${context.repo.repo}`,
            });

  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Export dependency list (excluding local project)
        run: uv export --all-extras --frozen --no-emit-project --no-hashes -o ${{ runner.temp }}/requirements.txt

      - name: Run pip-audit
        run: uvx pip-audit --strict --progress-spinner off -r ${{ runner.temp }}/requirements.txt

  secrets:
    name: Secret Detection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
